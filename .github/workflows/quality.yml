name: quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: cityimage-quality
          create-args: >-
            python=3.10
            pip
            geopandas
            shapely
            pyproj
            numpy
            pandas
            networkx
            matplotlib
            mapclassify
            osmnx
            python-igraph
            python-louvain
            dask
            numba
            pyvista
            psutil
            rasterio
            rasterstats
            tqdm
          cache-environment: true

      - name: Install package and dev tools
        shell: bash -l {0}
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Check installed dependencies
        shell: bash -l {0}
        run: python -m pip check

      - name: Compile Python files
        shell: bash -l {0}
        run: python -m compileall cityImage tests scripts

      - name: Ruff lint
        shell: bash -l {0}
        run: ruff check cityImage tests scripts

      - name: Ruff format check
        shell: bash -l {0}
        run: ruff format --check cityImage tests scripts

      - name: Comment and docstring consistency report
        shell: bash -l {0}
        continue-on-error: true
        run: python scripts/check_comment_style.py cityImage tests
