name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: cityimage-test
          create-args: >-
            python=${{ matrix.python-version }}
            pip
            geopandas
            shapely
            pyproj
            numpy
            pandas
            networkx
            matplotlib
            mapclassify
            osmnx
            python-igraph
            python-louvain
            dask
            numba
            pyvista
            tqdm
          cache-environment: true

      - name: Install package
        shell: bash -l {0}
        run: python -m pip install -e ".[test]"

      - name: Check installed dependencies
        shell: bash -l {0}
        run: python -m pip check

      - name: Compile Python files
        shell: bash -l {0}
        run: python -m compileall cityImage tests

      - name: Run unit tests
        shell: bash -l {0}
        run: pytest -m "not network" --cov=cityImage --cov-report=term-missing --cov-report=xml

  network-integration:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: cityimage-network
          environment-file: environment.yml
          cache-environment: true

      - name: Install package
        shell: bash -l {0}
        run: python -m pip install -e ".[test]"

      - name: Compile Python files
        shell: bash -l {0}
        run: python -m compileall cityImage tests

      - name: Run OSM/network tests
        shell: bash -l {0}
        run: pytest -m network -ra
