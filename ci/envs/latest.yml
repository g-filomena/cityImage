name: cityimage-all
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip

  # Core runtime
  - geopandas>=1.1.1
  - networkx>=3.3
  - numpy>=2.0
  - pandas>=2.2
  - pyproj>=3.4
  - shapely>=2.1

  # Optional runtime extras
  - dask>=2025.7.0
  - igraph>=0.11.9
  - mapclassify>=2.6
  - matplotlib>=3.8
  - osmnx>=2.0.5
  - psutil>=5.9
  - python-louvain>=0.16
  - pyvista>=0.45.3
  - rasterio>=1.3
  - rasterstats>=0.19
  - tqdm>=4.65.0

  # Test/dev tooling
  - pytest>=8
  - pytest-cov>=5
  - pip:
      - build>=1.2
      - ruff>=0.6
      - twine>=5
